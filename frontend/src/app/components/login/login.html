<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand-icon">⬡</div>
      <h1>InfraTrack</h1>
      <p>Infrastructure Management Platform</p>
    </div>
    @if (error) {
      <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:0.6rem 1rem;margin-bottom:1rem;color:#dc2626;font-size:0.85rem;font-weight:600;text-align:center">
        {{ error }}
      </div>
    }
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span class="label-text">Username</span>
        <input formControlName="username" type="text" placeholder="Enter your username" />
      </label>
      @if (form.get('username')?.invalid && form.get('username')?.touched) {
        <span class="error" style="margin-bottom:0.5rem;display:block;text-align:right">Username is required.</span>
      }
      <label>
        <span class="label-text">Password</span>
        <input formControlName="password" type="password" placeholder="Enter your password" />
      </label>
      @if (form.get('password')?.invalid && form.get('password')?.touched) {
        <span class="error" style="margin-bottom:0.5rem;display:block;text-align:right">Min. 6 characters.</span>
      }
      <button class="btn btn-primary" type="submit" [disabled]="form.invalid">Sign In</button>
    </form>
    <p class="login-footer">
      No account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
